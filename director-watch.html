<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DIRECTOR WATCH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #222;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #555;
    --danger: #ff4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* HEADER */
  .header {
    padding: 52px 20px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    line-height: 1;
  }

  .logo span {
    display: block;
    font-size: 22px;
    letter-spacing: 0.08em;
    color: var(--text);
    margin-top: 4px;
  }

  .count-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .count-badge strong {
    color: var(--accent);
    font-size: 20px;
    display: block;
    text-align: right;
    line-height: 1;
  }

  /* ADD BUTTON */
  .add-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 10px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    cursor: pointer;
    width: 100%;
    justify-content: center;
    font-weight: 500;
    transition: opacity 0.15s;
  }

  .add-btn:active { opacity: 0.7; }

  /* LIST */
  .list {
    padding: 0 20px;
    margin-top: 8px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
    line-height: 2;
  }

  .empty-state .icon {
    font-size: 32px;
    display: block;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-top: 8px;
    display: flex;
    align-items: stretch;
    overflow: hidden;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-main {
    flex: 1;
    padding: 14px 16px;
    cursor: pointer;
    min-width: 0;
    -webkit-user-select: none;
    user-select: none;
  }

  .card-main:active { background: #1a1a1a; }

  .card-number {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  .card-name {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-url {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-arrow {
    display: flex;
    align-items: center;
    padding: 0 14px 0 8px;
    color: var(--accent);
    font-size: 16px;
    flex-shrink: 0;
  }

  .card-delete {
    background: #1a0000;
    border: none;
    border-left: 1px solid var(--border);
    color: var(--danger);
    padding: 0 14px;
    cursor: pointer;
    font-size: 14px;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .card-delete:active { background: #2a0000; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border-top: 2px solid var(--accent);
    width: 100%;
    padding: 24px 20px 40px;
    transform: translateY(100%);
    transition: transform 0.25s ease;
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .field {
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus {
    border-color: var(--accent);
  }

  .field input::placeholder {
    color: var(--muted);
    font-size: 13px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  .btn-save {
    flex: 1;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    font-weight: 500;
    cursor: pointer;
  }

  .btn-cancel {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 14px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
  }

  /* FOOTER NOTE */
  .footer-note {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    padding: 20px;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      TVCF
      <span>DIRECTOR WATCH</span>
    </div>
    <div class="count-badge">
      <strong id="count">0</strong>
      DIRECTORS
    </div>
  </div>
  <button class="add-btn" onclick="openModal()">
    + 감독 추가하기
  </button>
</div>

<div class="list" id="list"></div>

<div class="footer-note" id="footer-note"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">NEW DIRECTOR</div>
    <div class="field">
      <label>감독 이름</label>
      <input id="inp-name" type="text" placeholder="홍길동 감독" autocomplete="off">
    </div>
    <div class="field">
      <label>포트폴리오 URL</label>
      <input id="inp-url" type="url" placeholder="https://star.tvcf.co.kr/..." autocomplete="off" inputmode="url">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveDirector()">저장</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'director_watch_v1';
  let directors = [];
  let editingIndex = -1;

  function load() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) directors = JSON.parse(saved);
    } catch(e) { directors = []; }
    render();
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(directors));
  }

  function render() {
    const list = document.getElementById('list');
    const count = document.getElementById('count');
    const footer = document.getElementById('footer-note');

    count.textContent = directors.length;

    if (directors.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <span class="icon">🎬</span>
          등록된 감독이 없습니다.<br>
          위 버튼으로 감독과 포트폴리오 URL을<br>추가해보세요.
        </div>`;
      footer.textContent = '';
      return;
    }

    list.innerHTML = directors.map((d, i) => `
      <div class="card">
        <div class="card-main" onclick="openUrl('${escHtml(d.url)}')">
          <div class="card-number">NO.${String(i+1).padStart(2,'0')}</div>
          <div class="card-name">${escHtml(d.name)}</div>
          <div class="card-url">${escHtml(d.url)}</div>
        </div>
        <div class="card-arrow" onclick="openUrl('${escHtml(d.url)}')">↗</div>
        <button class="card-delete" onclick="deleteDirector(${i})">✕</button>
      </div>
    `).join('');

    footer.textContent = `TAP → 포트폴리오 열기  |  ✕ → 삭제`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  function openUrl(url) {
    let u = url.trim();
    if (!u.startsWith('http')) u = 'https://' + u;
    window.open(u, '_blank');
  }

  function openModal(index = -1) {
    editingIndex = index;
    const modal = document.getElementById('modal');
    const title = document.getElementById('modal-title');
    const nameInp = document.getElementById('inp-name');
    const urlInp = document.getElementById('inp-url');

    if (index >= 0) {
      title.textContent = 'EDIT DIRECTOR';
      nameInp.value = directors[index].name;
      urlInp.value = directors[index].url;
    } else {
      title.textContent = 'NEW DIRECTOR';
      nameInp.value = '';
      urlInp.value = '';
    }

    modal.classList.add('open');
    setTimeout(() => nameInp.focus(), 300);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    editingIndex = -1;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  function saveDirector() {
    const name = document.getElementById('inp-name').value.trim();
    const url = document.getElementById('inp-url').value.trim();

    if (!name) { alert('감독 이름을 입력해주세요.'); return; }
    if (!url) { alert('URL을 입력해주세요.'); return; }

    if (editingIndex >= 0) {
      directors[editingIndex] = { name, url };
    } else {
      directors.push({ name, url });
    }

    save();
    closeModal();
    render();
  }

  function deleteDirector(i) {
    if (!confirm(`"${directors[i].name}" 삭제할까요?`)) return;
    directors.splice(i, 1);
    save();
    render();
  }

  load();
</script>
</body>
</html>
